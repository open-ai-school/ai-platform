<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="720" y2="200">
      <stop offset="0%" stop-color="#fdf4ff"/><stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="720" height="200" fill="url(#cbg)" rx="20"/>
  <text x="360" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#7c3aed">Understanding AI Confidence</text>
  <!-- High -->
  <g transform="translate(30,50)">
    <rect width="210" height="130" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <text x="105" y="32" text-anchor="middle" font-size="28">😄</text>
    <text x="105" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#047857">High: 80%+</text>
    <rect x="25" y="68" width="160" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="25" y="68" width="144" height="12" rx="6" fill="#10b981"/>
    <text x="175" y="78" font-family="system-ui,sans-serif" font-size="9" fill="#047857">90%</text>
    <text x="105" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#374151">"I'm quite sure this</text>
    <text x="105" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#374151">is a circle!"</text>
  </g>
  <!-- Medium -->
  <g transform="translate(255,50)">
    <rect width="210" height="130" rx="14" fill="white" stroke="#fde68a" stroke-width="2"/>
    <text x="105" y="32" text-anchor="middle" font-size="28">🤔</text>
    <text x="105" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#92400e">Medium: 50-80%</text>
    <rect x="25" y="68" width="160" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="25" y="68" width="100" height="12" rx="6" fill="#f59e0b"/>
    <text x="131" y="78" font-family="system-ui,sans-serif" font-size="9" fill="#92400e">63%</text>
    <text x="105" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#374151">"Could be a circle</text>
    <text x="105" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#374151">or an oval..."</text>
  </g>
  <!-- Low -->
  <g transform="translate(480,50)">
    <rect width="210" height="130" rx="14" fill="white" stroke="#fecaca" stroke-width="2"/>
    <text x="105" y="32" text-anchor="middle" font-size="28">😅</text>
    <text x="105" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#991b1b">Low: below 50%</text>
    <rect x="25" y="68" width="160" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="25" y="68" width="40" height="12" rx="6" fill="#ef4444"/>
    <text x="71" y="78" font-family="system-ui,sans-serif" font-size="9" fill="#991b1b">25%</text>
    <text x="105" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#374151">"I'm guessing...</text>
    <text x="105" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#374151">could be anything!"</text>
  </g>
</svg>
