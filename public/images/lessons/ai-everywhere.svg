    <path d="M73,28 L73,48 M63,38 L83,38" stroke="#047857" stroke-width="3" stroke-linecap="round"/>
    <circle cx="73" cy="38" r="14" stroke="#047857" stroke-width="2" fill="none"/>
    <text x="73" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#047857">Healthcare</text>
    <text x="73" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">X-ray diagnosis</text>
  </g>

  <!-- Agriculture -->
  <g transform="translate(210,198)">
    <rect width="145" height="100" rx="14" fill="white" stroke="#fde68a" stroke-width="1.5"/>
    <path d="M73,48 L73,28" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
    <path d="M73,28 C73,28 63,22 63,30 C63,38 73,34 73,34" stroke="#92400e" stroke-width="2" fill="#fde68a"/>
    <path d="M73,32 C73,32 83,26 83,34 C83,42 73,38 73,38" stroke="#92400e" stroke-width="2" fill="#fde68a"/>
    <text x="73" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#92400e">Agriculture</text>
    <text x="73" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Crop prediction</text>
  </g>

  <!-- Creative Arts -->
  <g transform="translate(370,198)">
    <rect width="145" height="100" rx="14" fill="white" stroke="#fecaca" stroke-width="1.5"/>
    <rect x="58" y="22" width="30" height="28" rx="3" stroke="#991b1b" stroke-width="2" fill="none"/>
    <circle cx="68" cy="40" r="5" stroke="#991b1b" stroke-width="2" fill="none"/>
    <circle cx="80" cy="33" r="3" fill="#991b1b"/>
    <text x="73" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#991b1b">Creative Arts</text>
    <text x="73" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Idea generation</text>
  </g>

  <!-- Education -->
  <g transform="translate(530,198)">
    <rect width="145" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <path d="M58,34 L73,24 L88,34 L73,44 Z" stroke="#4338ca" stroke-width="2" fill="none"/>
    <line x1="84" y1="32" x2="84" y2="44" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>
    <text x="73" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Education</text>
    <text x="73" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Personal tutoring</text>
  </g>
</svg>
