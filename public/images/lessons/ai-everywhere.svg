<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" fill="none">
  <defs>
    <linearGradient id="ebg" x1="0" y1="0" x2="720" y2="320">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#fdf4ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="320" fill="url(#ebg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#4338ca">AI is Already in Your Daily Life</text>

  <!-- Row 1: Daily AI -->
  <!-- Google Search -->
  <g transform="translate(30,52)">
    <rect width="130" height="108" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <circle cx="59" cy="40" r="14" stroke="#4338ca" stroke-width="2.5" fill="none"/>
    <line x1="69" y1="50" x2="79" y2="60" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round"/>
    <text x="65" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Google Search</text>
    <text x="65" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Understands intent</text>
  </g>

  <!-- Spam Filter -->
  <g transform="translate(175,52)">
    <rect width="130" height="108" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="43" y="24" width="44" height="32" rx="4" stroke="#4338ca" stroke-width="2" fill="none"/>
    <polyline points="43,26 65,44 87,26" stroke="#4338ca" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="65" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Spam Filter</text>
    <text x="65" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Learns bad emails</text>
  </g>

  <!-- Google Maps -->
  <g transform="translate(320,52)">
    <rect width="130" height="108" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <path d="M65,22 C58,22 52,28 52,35 C52,46 65,58 65,58 C65,58 78,46 78,35 C78,28 72,22 65,22 Z" stroke="#4338ca" stroke-width="2" fill="none"/>
    <circle cx="65" cy="34" r="4" fill="#4338ca"/>
    <text x="65" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Google Maps</text>
    <text x="65" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Traffic prediction</text>
  </g>

  <!-- Spotify -->
  <g transform="translate(465,52)">
    <rect width="130" height="108" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <circle cx="65" cy="38" r="16" stroke="#4338ca" stroke-width="2" fill="none"/>
    <path d="M56,32 Q65,36 74,32" stroke="#4338ca" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M57,38 Q65,42 73,38" stroke="#4338ca" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M58,44 Q65,48 72,44" stroke="#4338ca" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="65" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Spotify</text>
    <text x="65" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Music taste AI</text>
  </g>

  <!-- & more -->
  <g transform="translate(610,52)">
    <rect width="80" height="108" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="40" cy="34" r="3" fill="#a78bfa"/>
    <circle cx="32" cy="42" r="3" fill="#c084fc"/>
    <circle cx="48" cy="42" r="3" fill="#818cf8"/>
    <text x="40" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#6b7280">&amp; more</text>
  </g>

  <!-- Divider -->
  <line x1="60" y1="178" x2="660" y2="178" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="6 4"/>
  <rect x="320" y="171" width="80" height="14" rx="7" fill="#ede9fe"/>
  <text x="360" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#6366f1">CAREERS</text>

  <!-- Row 2: Career fields -->
  <!-- Healthcare -->
  <g transform="translate(50,198)">
