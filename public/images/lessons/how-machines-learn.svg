<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="hflow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#hbg)" rx="20"/>
  <text x="360" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#047857">How Machines Learn — Step by Step</text>
  <!-- Step 1: Data -->
  <g transform="translate(40,70)">
    <rect width="140" height="180" rx="14" fill="white" stroke="#a7f3d0" stroke-width="2"/>
    <circle cx="70" cy="45" r="24" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="70" y="52" text-anchor="middle" font-size="22">📸</text>
    <text x="70" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#047857">1. Collect Data</text>
    <text x="70" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Thousands of</text>
    <text x="70" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">labelled examples</text>
    <!-- Mini examples -->
    <g transform="translate(20,138)">
      <rect width="44" height="28" rx="4" fill="#f0fdf4" stroke="#86efac"/>
      <text x="22" y="18" text-anchor="middle" font-size="10">🐱</text>
    </g>
    <g transform="translate(76,138)">
      <rect width="44" height="28" rx="4" fill="#f0fdf4" stroke="#86efac"/>
      <text x="22" y="18" text-anchor="middle" font-size="10">🐶</text>
    </g>
  </g>
  <!-- Arrow 1 -->
  <g transform="translate(185,155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="url(#hflow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="38,-5 48,0 38,5" fill="#10b981"/>
  </g>
  <!-- Step 2: Train -->
  <g transform="translate(230,70)">
    <rect width="140" height="180" rx="14" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="70" cy="45" r="24" fill="#ede9fe" stroke="#6366f1" stroke-width="2"/>
    <text x="70" y="52" text-anchor="middle" font-size="22">🧠</text>
    <text x="70" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#4338ca">2. Train Model</text>
    <text x="70" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">AI finds patterns</text>
    <text x="70" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">in the data</text>
    <!-- Pattern vis -->
    <g transform="translate(25,140)">
      <rect width="90" height="30" rx="6" fill="#ede9fe"/>
      <circle cx="15" cy="15" r="4" fill="#6366f1" opacity="0.6"/>
      <circle cx="35" cy="10" r="5" fill="#8b5cf6" opacity="0.7"/>
      <circle cx="55" cy="18" r="3" fill="#a78bfa" opacity="0.5"/>
      <circle cx="75" cy="12" r="4.5" fill="#6366f1" opacity="0.8"/>
      <line x1="15" y1="15" x2="35" y2="10" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
      <line x1="35" y1="10" x2="55" y2="18" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
      <line x1="55" y1="18" x2="75" y2="12" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    </g>
  </g>
  <!-- Arrow 2 -->
  <g transform="translate(375,155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="url(#hflow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="38,-5 48,0 38,5" fill="#6366f1"/>
  </g>
  <!-- Step 3: Test -->
  <g transform="translate(420,70)">
    <rect width="140" height="180" rx="14" fill="white" stroke="#fde68a" stroke-width="2"/>
    <circle cx="70" cy="45" r="24" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="70" y="52" text-anchor="middle" font-size="22">🧪</text>
    <text x="70" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#92400e">3. Test It</text>
    <text x="70" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Try new images</text>
    <text x="70" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">it hasn't seen</text>
    <!-- Test visual -->
    <g transform="translate(20,138)">
      <rect width="100" height="30" rx="6" fill="#fef3c7"/>
      <text x="16" y="20" font-size="14">🐱</text>
      <text x="35" y="20" font-family="system-ui,sans-serif" font-size="10" fill="#92400e">→ Cat? ✓</text>
    </g>
  </g>
  <!-- Arrow 3 -->
  <g transform="translate(565,155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="url(#hflow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="38,-5 48,0 38,5" fill="#8b5cf6"/>
  </g>
  <!-- Step 4: Predict -->
  <g transform="translate(610,70)">
    <rect width="80" height="180" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <circle cx="40" cy="45" r="24" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="52" text-anchor="middle" font-size="22">✅</text>
    <text x="40" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#047857">4. Use!</text>
    <text x="40" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Ready for</text>
    <text x="40" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">real world</text>
  </g>
  <!-- Bottom: accuracy meter -->
  <g transform="translate(100,290)">
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#374151">Training Progress:</text>
    <rect x="140" y="-12" width="400" height="16" rx="8" fill="#e5e7eb"/>
    <rect x="140" y="-12" width="360" height="16" rx="8" fill="url(#hflow)">
      <animate attributeName="width" from="0" to="360" dur="3s" fill="freeze"/>
    </rect>
    <text x="550" y="0" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#047857">90%</text>
  </g>
  <!-- Bottom text -->
  <g transform="translate(100,330)">
    <rect width="520" height="50" rx="12" fill="white" opacity="0.7"/>
    <text x="260" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#374151">💡 <tspan font-weight="600">Key insight:</tspan> More data + better data = smarter AI</text>
    <text x="260" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Just like studying more helps you ace a test!</text>
  </g>
</svg>
