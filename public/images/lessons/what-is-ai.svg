<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="wbgd" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="wcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="720" height="400" fill="url(#wbg)" rx="20"/>
  <!-- Title -->
  <text x="360" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">What is AI? — How It Thinks</text>
  <!-- Left: Traditional Software -->
  <g transform="translate(100,80)">
    <rect width="200" height="260" rx="16" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <rect width="200" height="44" rx="16" fill="#e0e7ff"/>
    <text x="100" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Traditional Software</text>
    <!-- Rule boxes -->
    <g transform="translate(20,60)">
      <rect width="160" height="36" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="80" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">IF temp &gt; 30°C</text>
    </g>
    <text x="100" y="116" text-anchor="middle" font-size="16">⬇️</text>
    <g transform="translate(20,125)">
      <rect width="160" height="36" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="80" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">THEN "It's hot!"</text>
    </g>
    <text x="100" y="182" text-anchor="middle" font-size="16">⬇️</text>
    <g transform="translate(20,190)">
      <rect width="160" height="36" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
      <text x="80" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#92400e">Follows rules exactly</text>
    </g>
  </g>
  <!-- Center: VS -->
  <g transform="translate(330,180)">
    <circle r="30" fill="url(#wcard)"/>
    <text y="6" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">VS</text>
  </g>
  <!-- Right: AI -->
  <g transform="translate(420,80)">
    <rect width="200" height="260" rx="16" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <rect width="200" height="44" rx="16" fill="url(#wcard)"/>
    <text x="100" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white">Artificial Intelligence</text>
    <!-- Data examples -->
    <g transform="translate(20,60)">
      <rect width="160" height="36" rx="8" fill="#f0fdf4" stroke="#86efac"/>
      <text x="80" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#166534">🐱 + 🐱 + 🐱 = "Cat"</text>
    </g>
    <text x="100" y="116" text-anchor="middle" font-size="16">⬇️</text>
    <g transform="translate(20,125)">
      <rect width="160" height="36" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="80" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1e40af">🧠 Learns patterns</text>
    </g>
    <text x="100" y="182" text-anchor="middle" font-size="16">⬇️</text>
    <g transform="translate(20,190)">
      <rect width="160" height="36" rx="8" fill="#f0fdf4" stroke="#86efac"/>
      <text x="80" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#166534">🐱 → "That's a cat!"</text>
    </g>
  </g>
  <!-- Bottom label -->
  <text x="360" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Rules vs Learning — the core difference</text>
</svg>
