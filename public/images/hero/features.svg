<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="f1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="f2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="f3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="f4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
  </defs>
  <!-- Card 1: Multilingual -->
  <g transform="translate(10,10)">
    <rect width="160" height="180" rx="16" fill="white" stroke="#e0e7ff" stroke-width="1.5"/>
    <circle cx="80" cy="55" r="28" fill="url(#f1)" opacity="0.12"/>
    <text x="80" y="62" text-anchor="middle" font-size="28">🌍</text>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e1b4b">5 Languages</text>
    <text x="80" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">EN · FR · NL · HI · TE</text>
    <text x="80" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Learn AI in your</text>
    <text x="80" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">mother tongue</text>
  </g>
  <!-- Card 2: Free -->
  <g transform="translate(185,10)">
    <rect width="160" height="180" rx="16" fill="white" stroke="#d1fae5" stroke-width="1.5"/>
    <circle cx="80" cy="55" r="28" fill="url(#f2)" opacity="0.12"/>
    <text x="80" y="62" text-anchor="middle" font-size="28">🆓</text>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#064e3b">100% Free</text>
    <text x="80" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Open source MIT</text>
    <text x="80" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">No paywalls,</text>
    <text x="80" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">no sign-ups needed</text>
  </g>
  <!-- Card 3: Hands-on -->
  <g transform="translate(360,10)">
    <rect width="160" height="180" rx="16" fill="white" stroke="#fef3c7" stroke-width="1.5"/>
    <circle cx="80" cy="55" r="28" fill="url(#f3)" opacity="0.12"/>
    <text x="80" y="62" text-anchor="middle" font-size="28">🧪</text>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#78350f">Hands-On</text>
    <text x="80" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Interactive playground</text>
    <text x="80" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Build real AI</text>
    <text x="80" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">right in the browser</text>
  </g>
  <!-- Card 4: Beginner -->
  <g transform="translate(535,10)">
    <rect width="160" height="180" rx="16" fill="white" stroke="#fecaca" stroke-width="1.5"/>
    <circle cx="80" cy="55" r="28" fill="url(#f4)" opacity="0.12"/>
    <text x="80" y="62" text-anchor="middle" font-size="28">🌱</text>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#7f1d1d">Zero to Hero</text>
    <text x="80" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Start from scratch</text>
    <text x="80" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">No coding skills</text>
    <text x="80" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">required</text>
  </g>
</svg>
