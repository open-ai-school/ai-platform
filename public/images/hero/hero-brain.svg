<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="brain" x1="300" y1="150" x2="500" y2="450">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="350" y1="200" x2="450" y2="400">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)" rx="24"/>
  <!-- Floating particles -->
  <circle cx="120" cy="100" r="4" fill="#6366f1" opacity="0.3"><animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="680" cy="150" r="3" fill="#8b5cf6" opacity="0.25"><animate attributeName="cy" values="150;130;150" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="450" r="5" fill="#a78bfa" opacity="0.2"><animate attributeName="cy" values="450;430;450" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="480" r="3.5" fill="#6366f1" opacity="0.2"><animate attributeName="cy" values="480;460;480" dur="3.5s" repeatCount="indefinite"/></circle>
  <!-- Neural network connections -->
  <g stroke="#6366f1" stroke-width="1.5" opacity="0.15" filter="url(#softGlow)">
    <line x1="200" y1="200" x2="300" y2="280"/>
    <line x1="200" y1="400" x2="300" y2="320"/>
    <line x1="300" y1="280" x2="400" y2="300"/>
    <line x1="300" y1="320" x2="400" y2="300"/>
    <line x1="400" y1="300" x2="500" y2="250"/>
    <line x1="400" y1="300" x2="500" y2="350"/>
    <line x1="500" y1="250" x2="600" y2="300"/>
    <line x1="500" y1="350" x2="600" y2="300"/>
  </g>
  <!-- Neural nodes -->
  <circle cx="200" cy="200" r="8" fill="#6366f1" opacity="0.3"/>
  <circle cx="200" cy="400" r="8" fill="#6366f1" opacity="0.3"/>
  <circle cx="300" cy="280" r="10" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="300" cy="320" r="10" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="500" cy="250" r="10" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="500" cy="350" r="10" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="600" cy="300" r="8" fill="#a78bfa" opacity="0.3"/>
  <!-- Central brain shape -->
  <g filter="url(#shadow)" transform="translate(400,300)">
    <!-- Left hemisphere -->
    <path d="M-20,-80 C-70,-80 -100,-50 -100,0 C-100,30 -85,55 -60,70 C-45,80 -25,85 -10,80 C0,78 5,70 0,60 C-5,50 -15,45 -20,35 C-25,25 -20,15 -10,10 C0,5 5,-5 0,-15 C-5,-25 -15,-30 -20,-25 C-30,-15 -35,-25 -30,-40 C-25,-55 -15,-65 -20,-80Z" fill="url(#brain)" opacity="0.85"/>
    <!-- Right hemisphere -->
    <path d="M20,-80 C70,-80 100,-50 100,0 C100,30 85,55 60,70 C45,80 25,85 10,80 C0,78 -5,70 0,60 C5,50 15,45 20,35 C25,25 20,15 10,10 C0,5 -5,-5 0,-15 C5,-25 15,-30 20,-25 C30,-15 35,-25 30,-40 C25,-55 15,-65 20,-80Z" fill="url(#glow)" opacity="0.85"/>
    <!-- Central line -->
    <line x1="0" y1="-75" x2="0" y2="75" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Sparkle nodes on brain -->
    <circle cx="-40" cy="-30" r="4" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="45" cy="20" r="3" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="-15" cy="40" r="3.5" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.25;0.6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="25" cy="-50" r="3" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="1.8s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Orbiting elements -->
  <g transform="translate(400,300)">
    <!-- Book icon -->
    <g transform="translate(-160,-120)">
      <rect x="-16" y="-12" width="32" height="24" rx="3" fill="#6366f1" opacity="0.15"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">📚</text>
    </g>
    <!-- Lightbulb -->
    <g transform="translate(170,-100)">
      <rect x="-16" y="-12" width="32" height="24" rx="3" fill="#f59e0b" opacity="0.15"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">💡</text>
    </g>
    <!-- Globe -->
    <g transform="translate(-170,100)">
      <rect x="-16" y="-12" width="32" height="24" rx="3" fill="#10b981" opacity="0.15"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">🌍</text>
    </g>
    <!-- Rocket -->
    <g transform="translate(160,110)">
      <rect x="-16" y="-12" width="32" height="24" rx="3" fill="#ef4444" opacity="0.15"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">🚀</text>
    </g>
  </g>
  <!-- Bottom text area accent -->
  <rect x="250" y="520" width="300" height="4" rx="2" fill="url(#brain)" opacity="0.3"/>
</svg>
