<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" fill="none">
  <defs>
    <linearGradient id="lp" x1="0" y1="0" x2="720" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="33%" stop-color="#8b5cf6"/>
      <stop offset="66%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="720" height="160" fill="white" rx="16" stroke="#e0e7ff" stroke-width="1.5"/>
  <!-- Path line -->
  <line x1="100" y1="80" x2="620" y2="80" stroke="url(#lp)" stroke-width="3" stroke-dasharray="8 6" opacity="0.4"/>
  <!-- Step 1 -->
  <g transform="translate(100,80)">
    <circle r="24" fill="#ede9fe" stroke="#6366f1" stroke-width="2"/>
    <text y="6" text-anchor="middle" font-size="20">📖</text>
    <text y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#4338ca">What is AI?</text>
  </g>
  <!-- Step 2 -->
  <g transform="translate(273,80)">
    <circle r="24" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text y="6" text-anchor="middle" font-size="20">🧠</text>
    <text y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#047857">How AI Learns</text>
  </g>
  <!-- Step 3 -->
  <g transform="translate(447,80)">
    <circle r="24" fill="#fdf4ff" stroke="#a855f7" stroke-width="2"/>
    <text y="6" text-anchor="middle" font-size="20">🧪</text>
    <text y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#7c3aed">Build AI</text>
  </g>
  <!-- Step 4: Coming -->
  <g transform="translate(620,80)">
    <circle r="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2" stroke-dasharray="4 3"/>
    <text y="6" text-anchor="middle" font-size="20">🚀</text>
    <text y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#6b7280">More coming!</text>
  </g>
  <!-- Label -->
  <text x="360" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#374151">Your Learning Journey</text>
</svg>
