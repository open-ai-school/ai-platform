name: Update Content

on:
  repository_dispatch:
    types: [content-update]
  # Also run when ai-courses is updated (can be triggered manually)
  workflow_dispatch:

concurrency:
  group: content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update ai-courses submodule
        run: |
          echo "Updating content submodule to latest..."
          git submodule update --init --remote content
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No content changes detected"
          else
            git add content
            git commit -m "chore: update ai-courses content to latest"
            git push
          fi
