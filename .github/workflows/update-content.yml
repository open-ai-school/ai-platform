name: Update Content Submodules

on:
  repository_dispatch:
    types: [content-update]

concurrency:
  group: content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to latest
        run: |
          PROGRAM="${{ github.event.client_payload.program }}"
          # Sanitise input — only allow alphanumeric, dash, underscore
          PROGRAM=$(echo "$PROGRAM" | sed 's/[^a-zA-Z0-9_-]//g')
          echo "Updating content for: ${PROGRAM:-all}"
          git submodule update --init --remote
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          PROGRAM="${{ github.event.client_payload.program }}"
          PROGRAM=$(echo "$PROGRAM" | sed 's/[^a-zA-Z0-9_-]//g')
          if git diff --quiet; then
            echo "No submodule changes detected"
          else
            git add -A
            git commit -m "chore: update ${PROGRAM:-content} submodule to latest"
            git push
          fi
